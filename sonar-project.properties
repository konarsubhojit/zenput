sonar.projectKey=zenput
sonar.organization=konarsubhojit
sonar.projectName=zenput

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.module.css,**/*.stories.ts,**/*.stories.tsx,**/src/stories/**

# Code coverage — SonarCloud consumes LCOV for JS/TS.
# Vitest's v8 coverage provider emits coverage/lcov.info (see vitest.config.ts).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

