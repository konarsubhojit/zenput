# ═════════════════════════════════════════════════════════════════════════════
# Zenput — Azure Pipeline (self-hosted agent)
#
# Mirrors the GitHub Actions workflow (.github/workflows/ci.yml). Both systems
# invoke the same npm scripts so there is a single source of truth:
#
#     npm run lint && npm run type-check && npm run test:ci && npm run build
#
# ── Agent requirements ──────────────────────────────────────────────────────
#   Pool:          "Default" (self-hosted). Adjust `pool.name` below if yours
#                  is named differently (e.g. "default", "zenput-linux").
#   OS:            Linux (the demands filter can be edited for Windows/macOS).
#   Pre-installed: git, Node 20.x (via nvm is fine), npm 10+.
#                  Playwright browsers will be installed once into the agent
#                  cache (`~/.cache/ms-playwright`) on the A11y job.
#
# ── Pipeline variables / service connections ────────────────────────────────
#   SonarCloud service connection : "SonarCloud"  (tasks: SonarCloudPrepare@3,
#                                   SonarCloudAnalyze@3, SonarCloudPublish@3)
#   SONAR_TOKEN                   : secret variable (optional — Sonar steps
#                                   are gated behind ne(SONAR_TOKEN, ''))
#   CODECOV_TOKEN                 : optional; only required for private repos
#   NPM_TOKEN                     : required only by the "Publish" stage
#   VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
#                                 : used by the optional demo deploy stage
#
# ── Running the same steps locally ──────────────────────────────────────────
#   npm ci
#   npm run lint
#   npm run type-check
#   npm run test:ci
#   npm run build
#   npm run build-storybook
#   npm run size
# ═════════════════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - master
      - release/*

pr:
  branches:
    include:
      - '*'

# Weekly "clean" run — guards against stale state on a long-lived self-hosted
# agent. Regular CI runs skip the nuke (see `workspace.clean` below).
schedules:
  - cron: '0 6 * * 1'        # Mondays 06:00 UTC
    displayName: Weekly clean rebuild
    branches:
      include: [master]
    always: true

variables:
  - name: NODE_VERSION
    value: '20.x'
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm
  # On a self-hosted agent we persist installs across runs in a stable location.
  - name: PERSISTENT_CACHE_ROOT
    value: $(Agent.HomeDirectory)/_zenput_cache
  - name: CI
    value: 'true'
  - name: FORCE_COLOR
    value: '1'

pool:
  name: Default              # self-hosted pool — rename if your pool differs
  demands:
    - Agent.OS -equals Linux # adjust for Windows/macOS self-hosted agents

stages:
  - stage: CI
    displayName: 'CI (lint, test, build, size, a11y)'
    jobs:

      # ──────────────────────────────────────────────────────────────────────
      # Install — warms the npm cache. On self-hosted, the cache is re-used
      # across runs so this job is usually a few-second no-op after the first
      # run. `node_modules` itself is NOT published as an artifact (it would
      # be slower than a cache hit on the same machine); other jobs re-install
      # using the warmed cache via `npm ci --prefer-offline`.
      # ──────────────────────────────────────────────────────────────────────
      - job: Install
        displayName: 'Install dependencies'
        workspace:
          clean: outputs       # only wipe build outputs between runs
        steps:
          - checkout: self
            clean: false       # self-hosted: keep checkout to maximize cache hits
            fetchDepth: 0

          # Skip NodeTool download if the correct Node is already on PATH
          # (common on self-hosted agents managed via nvm).
          - script: |
              set -e
              NEED_NODE_TASK=true
              if command -v node >/dev/null 2>&1; then
                CURRENT="$(node -v | sed -E 's/^v([0-9]+).*/\1/')"
                WANTED="$(echo "$(NODE_VERSION)" | sed -E 's/^([0-9]+).*/\1/')"
                if [ "$CURRENT" = "$WANTED" ]; then
                  echo "Node $(node -v) already on PATH — skipping NodeTool."
                  NEED_NODE_TASK=false
                fi
              fi
              echo "##vso[task.setvariable variable=needNodeTask]$NEED_NODE_TASK"
            displayName: 'Detect pre-installed Node'

          - task: NodeTool@0
            displayName: 'Install Node $(NODE_VERSION) (only if missing)'
            condition: eq(variables['needNodeTask'], 'true')
            inputs:
              versionSpec: $(NODE_VERSION)

          - task: Cache@2
            displayName: 'Cache ~/.npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)

          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci'

      # ──────────────────────────────────────────────────────────────────────
      # Lint & Type-check — runs both in parallel as sibling steps inside one
      # job (cheap; reuses the warmed cache).
      # ──────────────────────────────────────────────────────────────────────
      - job: LintAndTypecheck
        displayName: 'Lint & Type-check'
        dependsOn: Install
        workspace:
          clean: outputs
        steps:
          - checkout: self
            clean: false
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci (cache warm)'
          - script: npm run lint
            displayName: 'ESLint (flat config)'
          - script: npm run type-check
            displayName: 'tsc --noEmit'

      # ──────────────────────────────────────────────────────────────────────
      # Test — Vitest with coverage, publishes JUnit + Cobertura to Azure, and
      # runs SonarCloud analysis when SONAR_TOKEN is configured.
      # ──────────────────────────────────────────────────────────────────────
      - job: Test
        displayName: 'Test (Vitest + coverage)'
        dependsOn: Install
        workspace:
          clean: outputs
        steps:
          - checkout: self
            clean: false
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci (cache warm)'

          - task: SonarCloudPrepare@3
            displayName: 'SonarCloud Prepare'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))
            inputs:
              SonarCloud: 'SonarCloud'
              organization: 'konarsubhojit'
              scannerMode: 'CLI'
              configMode: 'file'

          - script: npm run test:ci
            displayName: 'npm run test:ci'

          - task: PublishTestResults@2
            displayName: 'Publish JUnit results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'reports/junit.xml'
              mergeTestResults: true
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Cobertura coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: 'coverage/cobertura-coverage.xml'
              pathToSources: 'src'

          - task: SonarCloudAnalyze@3
            displayName: 'SonarCloud Analyze'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))

          - task: SonarCloudPublish@3
            displayName: 'SonarCloud Publish'
            condition: and(succeeded(), ne(variables['SONAR_TOKEN'], ''))
            inputs:
              pollingTimeoutSec: '300'

      # ──────────────────────────────────────────────────────────────────────
      # Build — library + Storybook static site. Publishes both as pipeline
      # artifacts so the Size and A11y jobs can consume them.
      # ──────────────────────────────────────────────────────────────────────
      - job: Build
        displayName: 'Build library + Storybook'
        dependsOn: Install
        workspace:
          clean: outputs
        steps:
          - checkout: self
            clean: false
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci (cache warm)'
          - script: npm run build
            displayName: 'Build library (rollup)'
          - script: npm run build-storybook
            displayName: 'Build Storybook'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish dist/'
            inputs:
              targetPath: 'dist'
              artifact: 'dist'
          - task: PublishPipelineArtifact@1
            displayName: 'Publish storybook-static/'
            inputs:
              targetPath: 'storybook-static'
              artifact: 'storybook-static'

      # ──────────────────────────────────────────────────────────────────────
      # Size — bundle-size budget via size-limit. Runs against the freshly
      # built `dist/`. Fails the job on regression.
      # ──────────────────────────────────────────────────────────────────────
      - job: Size
        displayName: 'Bundle size (size-limit)'
        dependsOn: Build
        workspace:
          clean: outputs
        steps:
          - checkout: self
            clean: false
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci (cache warm)'
          - task: DownloadPipelineArtifact@2
            displayName: 'Download dist/'
            inputs:
              artifact: dist
              path: dist
          - script: npx size-limit
            displayName: 'size-limit'

      # ──────────────────────────────────────────────────────────────────────
      # A11y — serve the built Storybook and run @storybook/test-runner with
      # axe-playwright. Playwright browsers are cached across runs.
      # ──────────────────────────────────────────────────────────────────────
      - job: A11y
        displayName: 'Storybook a11y (axe)'
        dependsOn: Build
        workspace:
          clean: outputs
        steps:
          - checkout: self
            clean: false
          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: $(npm_config_cache)
          - task: Cache@2
            displayName: 'Cache ~/.cache/ms-playwright'
            inputs:
              key: 'playwright | "$(Agent.OS)" | package-lock.json'
              path: $(HOME)/.cache/ms-playwright
          - script: npm ci --prefer-offline --no-audit --fund=false
            displayName: 'npm ci (cache warm)'
          - task: DownloadPipelineArtifact@2
            displayName: 'Download storybook-static/'
            inputs:
              artifact: storybook-static
              path: storybook-static
          - script: |
              set -e
              # Install Playwright browsers only when missing.
              if [ ! -d "$HOME/.cache/ms-playwright" ] || \
                 [ -z "$(ls -A "$HOME/.cache/ms-playwright" 2>/dev/null)" ]; then
                npx playwright install --with-deps chromium
              else
                echo "Playwright browsers already cached — skipping install."
              fi
            displayName: 'Install Playwright chromium (if missing)'
          - script: |
              set -e
              npx http-server storybook-static -p 6006 -s &
              SERVER_PID=$!
              npx wait-on http://127.0.0.1:6006 --timeout 60000
              npx test-storybook --url http://127.0.0.1:6006
              kill "$SERVER_PID" || true
            displayName: 'Run @storybook/test-runner (axe)'

  # ───────────────────────────────────────────────────────────────────────────
  # Optional publish stage — retained from previous pipeline configuration.
  # Runs only on pushes to release/** branches.
  # ───────────────────────────────────────────────────────────────────────────
  - stage: Publish
    displayName: 'Publish to npm'
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: PublishNpm
        displayName: 'Publish to npm registry'
        environment: 'npm-publish'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  clean: false
                - task: Cache@2
                  inputs:
                    key: 'npm | "$(Agent.OS)" | package-lock.json'
                    path: $(npm_config_cache)
                - script: npm ci --prefer-offline --no-audit --fund=false
                  displayName: 'npm ci'
                - script: npm run build
                  displayName: 'Build'
                - script: |
                    echo "//registry.npmjs.org/:_authToken=$(NPM_TOKEN)" > .npmrc
                    npm publish --access public --provenance
                  displayName: 'npm publish'
                  env:
                    NPM_TOKEN: $(NPM_TOKEN)
